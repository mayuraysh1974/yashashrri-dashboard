name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://zptxmsmndmsrjrqgskxt.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpwdHhtc21uZG1zcmpycWdza3h0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQzOTUzMjksImV4cCI6MjA2MDAzMTMyOX0.976H7z_tY-uR-C-H3u6z4u6z4u6z4u6z4u6z4u6z4u6' }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Initialize Capacitor and Android
        run: |
          npm install -g @capacitor/cli @capacitor/assets
          npx cap add android || npx cap sync android
          npx capacitor-assets generate --android
          mkdir -p android/app/src/main/res/xml
          echo '<?xml version="1.0" encoding="utf-8"?><network-security-config><domain-config cleartextTrafficPermitted="true"><domain includeSubdomains="true">supabase.co</domain><domain includeSubdomains="true">localhost</domain></domain-config></network-security-config>' > android/app/src/main/res/xml/network_security_config.xml
          sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config" android:usesCleartextTraffic="true"/g' android/app/src/main/AndroidManifest.xml
          sed -i '/<uses-permission android:name="android.permission.INTERNET" \/>/a \    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" \/>\n    <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" \/>' android/app/src/main/AndroidManifest.xml
          npx cap copy android

      - name: Build Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yashashrri-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
